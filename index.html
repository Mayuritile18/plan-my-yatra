<!DOCTYPE html>
<html lang="en">
<head>
    <title>Plan My Yatra</title>
    <link rel="stylesheet" href="./CSS/home.css">
</head>
<body>

<div class="main-hero-section">

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo-section">
            <img src="./images/main-logo.png" class="logo">
            <h1>Plan My <span>Yatra</span></h1>
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Destination</a>
            <a href="#">Plan Trip</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>

        <div class="login-links">
            <a href="#">Login</a>
            <a href="#">Sign Up</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero-content">
        <h1>Explore India</h1>
        <p>Discover beautiful destinations and plan your perfect journey with Plan My Yatra.</p>

        <div class="search-box">

    <div class="search-item">
        <img src="./images/location.png" class="icon">
        <input type="text" placeholder="Search destination">
    </div>

    <div class="search-item">
        <img src="./images/date.png" class="icon">
        <input type="date">
    </div>

    <div class="search-item">
        <img src="./images/people.png" class="icon">
        <input type="number" placeholder="Travelers">
    </div>

    <button>
        <img src="./images/search.png" class="search-icon">
        Search
    </button>

</div>
       <div class="stats">
    <div class="stat-item">
        <h2>500+</h2>
        <p>Destination</p>
    </div>

    <div class="stat-item">
        <h2>50K+</h2>
        <p>Happy Travelers</p>
    </div>

    <div class="stat-item">
        <h2>10+</h2>
        <p>Experience</p>
    </div>
</div>
    </div>

</div>

<!-- Popular Destination -->
<section class="destination-section">
    <h1>Popular Destination</h1>
    <p>Explore some of the most popular destinations</p>

    <div class="destination-grid">

        <div class="card big" style="background-image:url('./images/mountain.webp');"></div>

        <div class="column">
            <div class="card small" style="background-image:url('./images/kerala.jpg');"></div>
            <div class="card small" style="background-image:url('./images/gova.jpg');"></div>
        </div>

        <div class="column">
            <div class="card small" style="background-image:url('./images/rajastan.jpg');"></div>
            <div class="card small" style="background-image:url('./images/udaipur.jpg');"></div>
        </div>

    </div>
</section>
</body>
</html>
